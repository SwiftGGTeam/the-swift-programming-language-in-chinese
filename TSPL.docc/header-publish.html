<!-- Promotional Banner -->
<style>
  .promo-banner {
    position: relative;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    color: #fff;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
    line-height: 1.6;
    z-index: 999;
  }
  .promo-banner.hidden {
    display: none;
  }
  .promo-banner-inner {
    display: flex;
    align-items: center;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0;
    gap: 0;
  }
  .promo-banner-img {
    flex: 0 0 320px;
    height: 100%;
    overflow: hidden;
  }
  .promo-banner-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .promo-banner-content {
    flex: 1;
    padding: 20px 48px 20px 32px;
    min-width: 0;
  }
  .promo-banner-title {
    font-size: 17px;
    font-weight: 600;
    margin: 0 0 6px 0;
    letter-spacing: 0.2px;
  }
  .promo-banner-desc {
    font-size: 14px;
    margin: 0 0 12px 0;
    opacity: 0.88;
  }
  .promo-banner-cta {
    display: inline-block;
    background: linear-gradient(135deg, #e94560, #c81d5e);
    color: #fff !important;
    text-decoration: none !important;
    padding: 8px 24px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 600;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .promo-banner-cta:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 14px rgba(233, 69, 96, 0.45);
  }
  .promo-banner-close {
    position: absolute;
    top: 10px;
    right: 12px;
    background: rgba(255,255,255,0.15);
    border: none;
    color: #fff;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    padding: 0;
  }
  .promo-banner-close:hover {
    background: rgba(255,255,255,0.3);
  }
  /* Mobile */
  @media (max-width: 768px) {
    .promo-banner-inner {
      flex-direction: column;
    }
    .promo-banner-img {
      flex: none;
      width: 100%;
      max-height: 160px;
    }
    .promo-banner-content {
      padding: 16px 40px 18px 16px;
      text-align: center;
    }
    .promo-banner-title {
      font-size: 15px;
    }
    .promo-banner-desc {
      font-size: 13px;
    }
  }
</style>

<div id="promo-banner" class="promo-banner">
  <div class="promo-banner-inner">
    <div class="promo-banner-img">
      <img src="/images/org.swift.tspl/banner.jpg" alt="MiniMax Token Plan" onerror="this.parentElement.style.display='none'" />
    </div>
    <div class="promo-banner-content">
      <div class="promo-banner-title">🚀 MiniMax Token Plan 惊喜上线！新增语音、音乐、视频和图片生成权益。邀请好友享双重好礼，助力开发体验！</div>
      <div class="promo-banner-desc">好友立享 <strong>8.8折</strong> 专属优惠 + Builder 权益，你赢返利 + 社区特权！</div>
      <a class="promo-banner-cta" href="https://platform.minimaxi.com/subscribe/token-plan?code=FFaI9OHtgF&source=link" target="_blank" rel="noopener">👉 立即参与</a>
    </div>
  </div>
  <button class="promo-banner-close" onclick="document.getElementById('promo-banner').classList.add('hidden');try{localStorage.setItem('promo-banner-closed','1')}catch(e){}" aria-label="关闭">×</button>
</div>

<script>
  try { if (localStorage.getItem('promo-banner-closed') === '1') document.getElementById('promo-banner').classList.add('hidden'); } catch(e) {}
</script>
